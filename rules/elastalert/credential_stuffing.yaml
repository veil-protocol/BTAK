name: "Credential Stuffing Detection"
type: frequency
index: ".ds-so-suricata-*"
num_events: 10
timeframe:
  minutes: 2
filter:
  - bool:
      must:
        - term:
            event_type: "alert"
        - bool:
            should:
              - wildcard:
                  alert.signature: "*LOGIN*"
              - wildcard:
                  alert.signature: "*BRUTE*"
              - wildcard:
                  alert.signature: "*CREDENTIAL*"
              - wildcard:
                  alert.signature: "*PASSWORD*"
            minimum_should_match: 1
query_key: "src_ip"
alert:
  - debug
